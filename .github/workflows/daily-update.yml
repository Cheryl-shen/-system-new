name: Daily Auto Update

# 触发方式
on:
  # 1. 每天北京时间早上 9 点自动跑（UTC 时间 1 点）
  schedule:
    - cron: '0 1 * * *'
  # 2. 支持手动在 GitHub 网页上点 "Run workflow" 触发
  workflow_dispatch:
  # 3. 代码推送到 main 分支时也跑一次
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  daily-rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build works
        run: npm run build

      - name: Touch timestamp file to trigger EdgeOne rebuild
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-build.txt
          echo "Updated timestamp: $(cat .github/last-build.txt)"

      - name: Commit and push timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-build.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily auto-update $(date -u +'%Y-%m-%d')"
            git push
          fi
